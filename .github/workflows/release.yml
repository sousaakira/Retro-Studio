# Release — Linux (AppImage, .deb, tar.gz)
# Publicar: git tag v0.1.0 && git push origin v0.1.0
# Ou: Actions → Release (Linux) → Run workflow
name: Release (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão (ex: 0.1.0) - usa package.json se vazio'
        required: false

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + Electron)
        run: npm run build:linux

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create tar.gz from linux-unpacked
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd dist-electron
          tar -czvf RetroStudio-${VERSION}-x86_64.tar.gz linux-unpacked/

      - name: Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.tar.gz
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: retro-studio-linux-${{ steps.version.outputs.VERSION }}
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.tar.gz
