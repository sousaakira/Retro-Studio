<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo arredondado -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="100"/>
  
  <!-- Coroa/Monarca - estrutura principal -->
  <g transform="translate(256, 220)">
    <!-- Picos da coroa (5 picos) -->
    <path d="M -120 20 L -80 -60 L -40 30 L 0 -80 L 40 30 L 80 -60 L 120 20 L 120 100 Q 0 140 -120 100 Z" 
          fill="url(#glowGradient)" stroke="none"/>
    
    <!-- Joia central (círculo brilhante) -->
    <circle cx="0" cy="-90" r="20" fill="#ffeb3b" opacity="0.95"/>
    <circle cx="0" cy="-90" r="15" fill="#ffd700" opacity="0.8"/>
    
    <!-- Joias nos picos laterais -->
    <circle cx="-80" cy="-55" r="12" fill="#00d4ff" opacity="0.9"/>
    <circle cx="80" cy="-55" r="12" fill="#00d4ff" opacity="0.9"/>
    
    <!-- Banda/aro da coroa -->
    <ellipse cx="0" cy="100" rx="125" ry="25" fill="url(#glowGradient)" opacity="0.9"/>
    <ellipse cx="0" cy="100" rx="120" ry="20" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    
    <!-- Detalhes - diamantes na banda -->
    <rect x="-60" y="85" width="20" height="30" fill="#ffeb3b" opacity="0.7" transform="rotate(45 -50 100)"/>
    <rect x="40" y="85" width="20" height="30" fill="#ffeb3b" opacity="0.7" transform="rotate(45 50 100)"/>
  </g>
  
  <!-- Brilho/glow externo -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#glowGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.2"/>
</svg>
